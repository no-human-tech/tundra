# Visual-reference override — NOT part of the default local stack.
#
# `apps/web/e2e/login-visual.spec.ts`'s mockup-comparison tests (gated behind
# LOGIN_VISUAL_REFERENCE=1) need all four OAuth provider tiles visible, because
# that's what the supplied reference screenshot
# (apps/web/e2e/__screenshots__/login-light-1507x1060.png) shows. LoginPage.tsx
# only renders a tile when its `VITE_<PROVIDER>_CLIENT_ID` is non-empty — the
# default docker-compose.yml build deliberately leaves all four empty, so a
# normal `docker compose --profile apps up --build` never shows a provider
# that isn't really configured.
#
# This file layers dummy client ids onto the web build ONLY when explicitly
# included with `-f`, so the default stack (and everyone who doesn't pass this
# file) is completely unaffected:
#
#   docker compose -f infra/compose/docker-compose.yml \
#     -f infra/compose/docker-compose.visual-reference.yml \
#     --profile apps up -d --build web
#
#   $env:E2E_BASE_URL   = 'http://127.0.0.1:5173'
#   $env:LOGIN_VISUAL_REFERENCE = '1'
#   corepack pnpm --filter @tundra/web run e2e e2e/login-visual.spec.ts --project=chromium --reporter=line
#
# Rebuild the web image WITHOUT this file afterwards (or run
# `docker compose -f infra/compose/docker-compose.yml --profile apps up -d --build web`)
# to go back to the real, provider-less default before any other local testing.
services:
  web:
    build:
      args:
        VITE_GITHUB_CLIENT_ID: visual-reference-dummy-github-client-id
        VITE_GITLAB_CLIENT_ID: visual-reference-dummy-gitlab-client-id
        VITE_GOOGLE_CLIENT_ID: visual-reference-dummy-google-client-id
        VITE_APPLE_CLIENT_ID: visual-reference-dummy-apple-client-id
