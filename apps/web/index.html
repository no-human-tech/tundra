<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <!-- Anti-FOUC: read the persisted theme before first paint (see
         packages/ui/src/theme/themeController.ts). Mirrors getTheme(): the key
         wins ONLY if it holds a valid value; absent/invalid/blocked storage
         all resolve to light — the required default. -->
    <script>
      (function(){try{var a=localStorage.getItem('tundra_theme');if(a==='dark'){document.documentElement.setAttribute('data-theme','dark');document.documentElement.style.colorScheme='dark';}}catch(e){}}());
    </script>
    <meta
      name="description"
      content="Tundra — modular project-management and collaboration platform. Source-available and free to self-host."
    />
    <title>Tundra</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
